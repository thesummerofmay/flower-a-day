<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flower a Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">

    <header>
      <div class="wordmark">&#10022; Flower a Day</div>
      <nav class="date-nav">
        <button class="nav-btn" id="btn-prev">&#8249; Previous</button>
        <div class="date-display">
          <span class="date-label" id="date-label"></span>
          <span class="date-sep">&#8212;</span>
          <span class="date-sub" id="date-sub"></span>
        </div>
        <button class="nav-btn" id="btn-next">Next &#8250;</button>
      </nav>
    </header>

    <main class="main-layout">

      <!-- Left: illustration + identity -->
      <div class="left-panel">
        <div class="illustration-ring" id="img-ring">
          <img id="flower-img" src="" alt="" style="display:none">
          <div class="img-placeholder" id="img-placeholder">
            <div class="spinner"></div>
          </div>
        </div>
        <div class="flower-identity">
          <h2 class="flower-name" id="flower-name"></h2>
          <p class="flower-latin" id="flower-latin"></p>
          <p class="flower-family" id="flower-family"></p>
        </div>
        <p class="img-credit" id="img-credit" style="visibility:hidden">Image via Wikipedia</p>
      </div>

      <!-- Right: description + tabbed info -->
      <div class="right-panel">
        <p class="flower-desc" id="flower-desc"></p>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="habitat">Origin &amp; Habitat</button>
          <button class="tab-btn" data-tab="medical">Medicinal Uses</button>
          <button class="tab-btn" data-tab="uses">Culinary &amp; Uses</button>
          <button class="tab-btn" data-tab="facts">Did You Know?</button>
        </div>

        <div class="tab-content">
          <div class="tab-pane active" id="tab-habitat"></div>
          <div class="tab-pane" id="tab-medical"></div>
          <div class="tab-pane" id="tab-uses"></div>
          <div class="tab-pane" id="tab-facts"></div>
        </div>
      </div>

    </main>

  </div>
  <script src="app.js"></script>
</body>
</html>
